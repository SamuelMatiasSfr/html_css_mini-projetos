<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+NZ+Basic:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Gerador de Senhas</h1>

        <div class="caixa-senha">
            <p id="senha-gerada">pY789###Aa</p>
            <span class="material-symbols-outlined" id="icone-copiar">content_copy</span>
        </div>

        <div class="gerador-senhas">
            <div class="controles">
                <div class="info-tamanho">
                    <label class="label" for="texto-tamanho-senha">Tamanho da Senha</label>
                    <p id="texto-tamanho-senha">0</p>
                </div>
                <input type="range" class="input-range" id="barra-tamanho-senha" min="0" max="20" value="0">

                <div class="checkboxes">
                    <label class="label label-checkbox"><input type="checkbox" class="input-checkbox" id="incluir-maiusculas"> Incluir Letras Maiúsculas</label>
                    <label class="label label-checkbox"><input type="checkbox" class="input-checkbox" id="incluir-minusculas"> Incluir Letras Minúsculas</label>
                    <label class="label label-checkbox"><input type="checkbox" class="input-checkbox" id="incluir-numeros"> Incluir Números</label>
                    <label class="label label-checkbox"><input type="checkbox" class="input-checkbox" id="incluir-simbolos"> Incluir Símbolos</label>
                </div>
            </div>

            <div class="feedback">
                <p class="feedback-text">FORÇA</p>
                <div class="nivel-seguranca">
                    <p class="nivel-seguranca-text">FRACO</p>
                    <div class="barra-seguranca"></div>
                    <div class="barra-seguranca"></div>
                    <div class="barra-seguranca"></div>
                    <div class="barra-seguranca"></div>
                </div>
            </div>

            <button id="gerar-senha">GERAR SENHA</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
